<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(129deg, #6877e0 35%, #7451ab 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI';


        }

        main {
            display: flex;
            gap: 40px;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
            max-width: 400px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 0px 30px 20px #0000007a;
            /* box-shadow: 
            1 - offset-x Descolamento eixo X (horizontal)
            2 - offset-x Descolamento eixo Y (vertical)
            3 - Blur Desfoque da sombra
            4 - Spread Espalhamento da Sombra
            5 - Color cor da sombra #000000
            */
        }


        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;

        }

        article {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;

        }

        .perfil {
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            background-color: #6767ea;
            width: 120px;
            height: 120px;
            outline: 2px solid #ffffff;
            outline-offset: -5px;

        }

        h1 {
            font-weight: 500px;
            font-size: 40px;
        }

        h3 {
            color: #6767ea;
            font-weight: 600;
        }

        h4 {
            font-size: 22px;
            font-weight: 500;
        }

        p {
            text-align: center;
            line-height: 1.7;
            color: #555
        }


        ul {
            display: flex;
            gap: 10px;
        }

        ul li {
            list-style: none;
            background-color: #f7fafc;
            outline: 2px solid #f4f4f4;
            border-radius: 20px;
            padding: 5px 8px;
            color: #6767ea;
        }

        button {
            font-weight: 600;
            cursor: pointer;
            border-radius: 20px;
            padding: 8px 25px;
            color: #ffffff;
            border: none;
            box-shadow: 0px 0px 10px 5px #6876e055;
            background: linear-gradient(129deg, #6877e0 35%, #7451ab 100%);
            transition: all 0.7s ease;

        }

        button:hover {
            background: black;
            transform: scale(1.05);
        }
    </style>

</head>

<body>
    <main>
        <header>
            <span class="perfil">
                <h1>BS</h1>
            </span>

            <h2> Bruno Santos </h2>

            <h3> Desenvolvedor Front-End </h3>

        </header>

        <article>
            <p>
                Apaixonado por criar condeutos digitais incriveis.
                Especializado em HTML, CSS e JavaScript com foco em interfaces modernas e responsivas.
            </p>

        </article>


        <article>
            <h4>Habilidades</h4>
            <ul>
                <li>HTML</li>
                <li>CSS3</li>
                <li>JavaScript</li>
                <li>FlexBox</li>
            </ul>
        </article>

        <button> Entre em contato </button>
    </main>


</body>

</html>
